<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script src="https://telegram.org/js/telegram-web-app.js?v=1.1"></script>
    
    <style>
        /* Hardcoding some colors as backup in case Telegram's "Auto-Theme" fails */
        :root {
            --bg-color: var(--tg-theme-bg-color, #1c1c1d);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --btn-color: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: #999999;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--btn-color);
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .price {
            font-size: 22px;
            color: var(--btn-color);
            font-weight: bold;
            display: block;
            margin: 10px 0;
        }

        button {
            background-color: var(--btn-color);
            color: var(--btn-text);
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-text">PEAKFORM</div>
        <div style="color: var(--hint-color); font-size: 12px;">Premium Supplements Ethiopia</div>
    </div>

    <div class="product-card">
        <div style="font-size: 18px; font-weight: bold;">USN Hyperbolic Mass</div>
        <span class="price">12,000 ETB</span>
        <button onclick="buy('Hyperbolic Mass', 12000)">Add to Cart</button>
    </div>

    <div class="product-card">
        <div style="font-size: 18px; font-weight: bold;">USN Blue Lab Whey</div>
        <span class="price">5,800 ETB</span>
        <button onclick="buy('Blue Lab Whey', 5800)">Add to Cart</button>
    </div>

    <script>
        // Very important: Initialize the app
        const webapp = window.Telegram.WebApp;
        webapp.ready(); // Tells Telegram the app is loaded
        webapp.expand(); // Makes it full screen

        function buy(item, price) {
            webapp.MainButton.text = "Pay " + price + " ETB for " + item;
            webapp.MainButton.show();
            
            webapp.MainButton.onClick(function() {
                webapp.showAlert("Redirecting to Chapa for " + item);
                // Later we will put the real link here
            });
        }
    </script>
</body>
</html>
