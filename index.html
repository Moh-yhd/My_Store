<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peakform Nutrition & Fitness</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff5722; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 32px; font-weight: 900; color: var(--accent); }
        .product-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; width: 100%; max-width: 350px; border: 1px solid rgba(255,87,34,0.2); }
        .product-img { width: 100%; border-radius: 12px; margin-bottom: 15px; background: white; height: 200px; object-fit: contain; }
        select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #2a2a2a; color: white; border: 2px solid var(--accent); font-size: 16px; outline: none; }
        .price { font-size: 24px; color: var(--accent); font-weight: 800; display: block; margin: 10px 0; }
        .stock-tag { font-size: 13px; font-weight: bold; margin-bottom: 8px; display: block; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-buy:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">PEAKFORM</div>
        <div style="font-size: 12px; color: #888;">OFFICIAL USN DISTRIBUTOR</div>
    </div>

    <div id="product-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="product-card">
            <img class="product-img" src="https://raw.githubusercontent.com/Moh-yhd/My_Store/main/6009544944973.png">
            <div style="font-size: 20px; font-weight: bold;">Hyperbolic Mass</div>
            <select id="size-hyper" onchange="updatePrice('hyper')">
                <option value="4000">1kg - 4,000 ETB</option>
                <option value="9000" selected>3kg - 9,000 ETB</option>
            </select>
            <select id="flavor-hyper" onchange="checkStock()">
                <option value="choc">Chocolate</option>
                <option value="vani">Vanilla</option>
                <option value="stra">Strawberry</option>
            </select>
            <div id="stock-display-hyper" class="stock-tag">Checking stock...</div>
            <span class="price" id="price-hyper">9,000 ETB</span>
            <button class="btn-buy" id="btn-hyper" onclick="order('Hyperbolic Mass', 'hyper')">Buy Now</button>
        </div>

        <div class="product-card">
            <img class="product-img" src="https://raw.githubusercontent.com/Moh-yhd/My_Store/main/Bluelab_Whey.png">
            <div style="font-size: 20px; font-weight: bold;">Blue Lab Whey</div>
            <select id="size-whey" onchange="updatePrice('whey')">
                <option value="5100">454g - 5,100 ETB</option>
                <option value="8100">908g - 8,100 ETB</option>
                <option value="15800" selected>2kg - 15,800 ETB</option>
            </select>
            <select id="flavor-whey" onchange="checkStock()">
                <option value="choc">Chocolate</option>
                <option value="vani">Vanilla</option>
                <option value="stra">Strawberry</option>
            </select>
            <div id="stock-display-whey" class="stock-tag">Checking stock...</div>
            <span class="price" id="price-whey">15,800 ETB</span>
            <button class="btn-buy" id="btn-whey" onclick="order('Blue Lab Whey', 'whey')">Buy Now</button>
        </div>

        <div class="product-card">
            <img class="product-img" src="https://raw.githubusercontent.com/Moh-yhd/My_Store/main/Creatine.png">
            <div style="font-size: 20px; font-weight: bold;">Pure Creatine</div>
            <select id="size-creat" onchange="updatePrice('creat')">
                <option value="2800" selected>200g - 2,800 ETB</option>
                <option value="4600">410g - 4,600 ETB</option>
            </select>
            <div id="stock-display-creat" class="stock-tag">Checking stock...</div>
            <span class="price" id="price-creat">2,800 ETB</span>
            <button class="btn-buy" id="btn-creat" onclick="order('Pure Creatine', 'creat')">Buy Now</button>
        </div>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 1. UPDATE THIS URL FROM YOUR LATEST GOOGLE DEPLOYMENT
    const WAREHOUSE_URL = "https://script.google.com/macros/s/AKfycbxd0xf8TS0_mO5jTczxE8y7GvaNB-tMXvIYZkirXjRX8SO_OiIWwBqY0C7beRuLjNXe/exec";
    
    // 2. CSV LINK FROM GOOGLE SHEETS
    const STOCK_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTd4tmcEv_GqiPOxe3Yph1bRfjhabG3BH9M16AvbzXdvpk8J0317VgbjMV43ZEKkg0FLusle1ddJ0q/pub?output=csv";

    let isProcessing = false;

    // --- FIX #1: RELIABLE STOCK CHECKING ---
    async function checkStock() {
        try {
            const response = await fetch(STOCK_DATA_URL + '&cache=' + new Date().getTime());
            const csvText = await response.text();
            const rows = csvText.split('\n');
            const products = ['hyper', 'whey', 'creat'];
            
            products.forEach(id => {
                const s = document.getElementById(`size-${id}`);
                const f = document.getElementById(`flavor-${id}`);
                
                // Constructing the SKU exactly how it appears in your sheet
                const sizeTxt = s.options[s.selectedIndex].text.split(' ')[0].toLowerCase();
                const flavKey = f ? f.value : 'unfl';
                const currentSKU = `${id}-${sizeTxt}-${flavKey}`.trim().toLowerCase();

                // Find the row where Column A matches our SKU
                const row = rows.find(r => r.split(',')[0].trim().toLowerCase() === currentSKU);
                const display = document.getElementById(`stock-display-${id}`);
                const btn = document.getElementById(`btn-${id}`);

                if (row) {
                    const columns = row.split(',');
                    const qty = parseInt(columns[4]); // Column E is index 4

                    if (isNaN(qty) || qty <= 0) {
                        display.innerText = "❌ OUT OF STOCK";
                        display.style.color = "#ff4444";
                        btn.disabled = true;
                        btn.innerText = "SOLD OUT";
                    } else {
                        display.innerText = "✅ IN STOCK (" + qty + ")";
                        display.style.color = "#4caf50";
                        btn.disabled = false;
                        btn.innerText = "BUY NOW";
                    }
                } else {
                    display.innerText = "SKU NOT FOUND";
                    btn.disabled = true;
                }
            });
        } catch (e) { console.log("Stock check failed", e); }
    }

    setInterval(checkStock, 30000); // Check every 30 seconds
    checkStock(); 

    function updatePrice(id) {
        const val = document.getElementById(`size-${id}`).value;
        document.getElementById(`price-${id}`).innerText = `${Number(val).toLocaleString()} ETB`;
        checkStock(); 
        tg.HapticFeedback.selectionChanged();
    }

    // --- FIX #2: STOP DEDUCTING WRONG PRODUCT ---
    function order(name, id) {
        if (isProcessing) return;

        tg.HapticFeedback.impactOccurred('medium');
        
        const s = document.getElementById(`size-${id}`);
        const f = document.getElementById(`flavor-${id}`);
        const sizeTxt = s.options[s.selectedIndex].text.split(' ')[0].toLowerCase();
        const flavKey = f ? f.value : 'unfl';
        const sku = `${id}-${sizeTxt}-${flavKey}`.trim().toLowerCase();

        tg.MainButton.text = `CONFIRM ${name.toUpperCase()} (${sizeTxt})`;
        tg.MainButton.show();

        // CRITICAL: Remove any previous click listeners so it doesn't order the OLD product
        tg.MainButton.offClick(); 

        tg.MainButton.onClick(function() {
            if (isProcessing) return;
            isProcessing = true;
            tg.MainButton.showProgress();
            
            // Notify Warehouse
            fetch(`${WAREHOUSE_URL}?id=${sku}&action=notify`, {mode: 'no-cors'});
            
            const flavTxt = f ? f.options[f.selectedIndex].text : "Unflavored";
            const price = Number(s.value).toLocaleString();
            const msg = encodeURIComponent(`Hello! I want to order ${name} (${sizeTxt.toUpperCase()}) - ${flavTxt} for ${price} ETB.`);
            
            setTimeout(() => {
                tg.openTelegramLink(`https://t.me/kawari?text=${msg}`);
                tg.MainButton.hide();
                tg.MainButton.hideProgress();
                isProcessing = false;
                checkStock(); // Refresh stock immediately after order
            }, 800);
        });
    }
</script>
</body>
</html>
