<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peakform Nutrition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-link: var(--tg-theme-link-color, #2481cc);
            --tg-button: var(--tg-theme-button-color, #3390ec);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--tg-button);
        }

        .product-card {
            background-color: var(--tg-bg);
            border: 1px solid var(--tg-hint);
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
<body>
    <div class="header">
        <div class="logo">PEAKFORM</div>
        <p style="color: var(--tg-hint);">Premium Sports Nutrition & Fitness</p>
    </div>

    <div id="product-list" style="width: 100%; display: grid; grid-template-columns: 1fr; gap: 16px;">
        
        <div class="product-card">
            <div class="product-image">4kg Bag</div> 
            <div class="product-title">USN Hyperbolic Mass</div>
            <div class="product-price">12,000 ETB</div>
            <button class="btn-buy" onclick="handleBuy('USN Hyperbolic Mass', 12000)">Add to Cart</button>
        </div>
        
        <div class="product-card">
            <div class="product-image">2kg Tub</div>
            <div class="product-title">USN Blue Lab Whey</div>
            <div class="product-price">5,800 ETB</div>
            <button class="btn-buy" onclick="handleBuy('USN Blue Lab Whey', 5800)">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-image">500g</div>
            <div class="product-title">USN Pure Creatine</div>
            <div class="product-price">2,400 ETB</div>
            <button class="btn-buy" onclick="handleBuy('USN Pure Creatine', 2400)">Add to Cart</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Placeholder for your Chapa links
        const productLinks = {
            "USN Hyperbolic Mass": "https://chapa.co/pay/TEST-LINK-1",
            "USN Blue Lab Whey": "https://chapa.co/pay/TEST-LINK-2",
            "USN Pure Creatine": "https://chapa.co/pay/TEST-LINK-3"
        };

        function handleBuy(name, price) {
            tg.MainButton.text = `Pay ${price} ETB for ${name}`;
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                const payLink = productLinks[name];
                if (payLink && payLink.includes("TEST-LINK")) {
                    tg.showPopup({
                        title: 'Setup Required',
                        message: 'You need to create a real link in your Chapa dashboard and paste it into the code!',
                        buttons: [{type: 'ok'}]
                    });
                } else if (payLink) {
                    tg.openLink(payLink);
                }
            });
        }
    </script>
</body>
       
</html>
