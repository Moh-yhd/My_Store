<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peakform Nutrition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-link: var(--tg-theme-link-color, #2481cc);
            --tg-button: var(--tg-theme-button-color, #3390ec);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--tg-button);
            margin-bottom: 4px;
        }

        .sub-header {
            font-size: 14px;
            color: var(--tg-hint);
            margin-top: 0;
        }

        #product-list {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 400px;
        }

        .product-card {
            background-color: var(--tg-secondary);
            border-radius: 15px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .product-image-placeholder {
            width: 100%;
            height: 150px;
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--tg-hint);
            margin-bottom: 12px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin: 10px 0 5px 0;
        }

        .product-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--tg-link);
            margin-bottom: 15px;
        }

        .btn-buy {
            background-color: var(--tg-button);
            color: var(--tg-button-text);
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-buy:active
